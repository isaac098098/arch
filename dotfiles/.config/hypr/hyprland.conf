# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=HDMI-A-1,preferred,auto,1
monitor=eDP-1,preferred,auto,1


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = wofi --style "/home/isaac09809/.config/wofi/style.css" -W 550 -H 310px --columns=2 --show drun

# Some default env vars.
env = HYPRCURSOR_THEME,Nordic-cursors
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Nordic-cursors
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    #kb_layout = latam
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.

}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 7, 20, 20, 20
    border_size = 0
    col.active_border = rgba(cba6f7ff) rgba(eba0acff) 45deg
    col.inactive_border = rgba(1e1e2eff)
    #col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

	no_border_on_floating = true

	#cursor_inactive_timeout = 1
}

cursor {
    hide_on_touch = false
	no_warps = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0

	active_opacity = 1
	inactive_opacity = 1
    
    blur {
        enabled = false
        size = 5
        passes = 1
		popups = true
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 2
    #col.shadow = rgba(1a1a1aee)
	col.shadow= 0x66000000
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = true
    workspace_swipe_touch = true
    workspace_swipe_invert = false
    workspace_swipe_cancel_ratio = 0.1
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
	disable_splash_rendering = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Plugins

plugin:touch_gestures {
  # The default sensitivity is probably too low on tablet screens,
  # I recommend turning it up to 4.0
  sensitivity = 1.0

  # must be >= 3
  #workspace_swipe_fingers = 3

  # switching workspaces by swiping from an edge, this is separate from workspace_swipe_fingers
  # and can be used at the same time
  # possible values: l, r, u, or d
  # to disable it set it to anything else
  workspace_swipe_edge = false

  # in milliseconds
  long_press_delay = 300

  experimental {
    # send proper cancel events to windows instead of hacky touch_up events,
    # NOT recommended as it crashed a few times, once it's stabilized I'll make it the default
    send_cancel = 0
  }
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

windowrule=rounding 15,^(kitty)(.*)$
windowrule=rounding 15,^(org.pwmt.zathura)(.*)$
windowrule=rounding 15,^(org.gnome.Nautilus)(.*)$
windowrule=rounding 15,^(Brave)(.*)$
windowrulev2=float, title:^(wvkbd-mobintl -fn "IosevkaNF Bold")(.*)$
windowrulev2=noshadow,class:^(Xdg-desktop-portal-gtk)(.*)$
windowrulev2=size 1060 540,class:^(Xdg-desktop-portal-gtk)(.*)$
windowrulev2=rounding 15,class:^(Xdg-desktop-portal-gtk)(.*)$

#Workspaces rules

windowrulev2=workspace 2,initialclass:^(org.gnome.Nautilus)(.*)$
windowrulev2=workspace 3,initialclass:^(Brave-browser)(.*)$
windowrulev2=workspace 4,initialclass:^(libreoffice-startcenter)(.*)$
windowrulev2=workspace 4,initialclass:^(org.pwmt.zathura)(.*)$
windowrulev2=workspace 5,initialclass:^(com.github.xournalpp.xournalpp)(.*)$

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = ALT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod SHIFT, E, exit, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, # dwindle

#Other binds
bind = $mainMod, O, exec, hyprctl keyword input:touchdevice:transform 2
bind = $mainMod, I, exec, hyprctl keyword input:touchdevice:transform 0

# hyprgrass binds
bind = , edge:d:u, exec, bash $HOME/.local/bin/wvkbd-toggle
bind = , tap:3, killactive
bind = , edge:u:d, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, j, movefocus, l
bind = $mainMod, semicolon, movefocus, r
bind = $mainMod, l, movefocus, u
bind = $mainMod, k, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Window resizing							X	Y
bind = $mainMod SHIFT, j, resizeactive, 	-60 0
bind = $mainMod SHIFT, semicolon, resizeactive, 60 	0
bind = $mainMod SHIFT, l, resizeactive, 	0 	-60
bind = $mainMod SHIFT, j, resizeactive, 	0 	60

# Brigthness
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Volume
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-volume @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute  @DEFAULT_SOURCE@ toggle

# Screenshots
bind = , Print, exec, grim $(xdg-user-dir HOME)/Documents/images/screens/$(date +'%s.png')

# waybar
exec-once = hyprpaper
exec-once = iio-hyprland
exec-once = hyprpm reload
exec-once = dunst
exec-once = eww open cattpuccin
