backend = "glx";
corner-radius = 0;

shadow = true;

#shadow-radius = 2;
#shadow-offset-x = 8;
#shadow-offset-y = 8;
#shadow-opacity = 0.65;

fading = true;
fade-in-step=0.03;
fade-out-step=0.03;
fade-delta=10;

shadow-exclude = [
   "class_g = 'Eww'",
   "window_type = 'menu'",
   "window_type = 'utility'",
   "window_type = 'popup_menu'"
]

rounded-corners-exclude = [
    "class_g = 'krita'"
]

opacity-rule = [
    "70:class_g = 'Gnome-pomodoro'"
]
